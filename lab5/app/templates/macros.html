{% macro render_user_form(roles, user=None, errors={}, is_edit=False, current_user=None) %}
<form method="POST">
    {% if not is_edit %}
    <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="login" class="form-control {% if errors.login %}is-invalid{% endif %}" value="{{ request.form.get('login', '') }}">
        <div class="invalid-feedback">{{ errors.login }}</div>
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control {% if errors.password %}is-invalid{% endif %}">
        <div class="invalid-feedback">{{ errors.password }}</div>
    </div>
    {% endif %}

    <div class="mb-3">
        <label class="form-label">Фамилия</label>
        <input type="text" name="last_name" class="form-control {% if errors.last_name %}is-invalid{% endif %}" value="{{ request.form.get('last_name', user.last_name if user else '') }}">
        <div class="invalid-feedback">{{ errors.last_name }}</div>
    </div>
    <div class="mb-3">
        <label class="form-label">Имя</label>
        <input type="text" name="first_name" class="form-control {% if errors.first_name %}is-invalid{% endif %}" value="{{ request.form.get('first_name', user.first_name if user else '') }}">
        <div class="invalid-feedback">{{ errors.first_name }}</div>
    </div>
    <div class="mb-3">
        <label class="form-label">Отчество</label>
        <input type="text" name="middle_name" class="form-control" value="{{ request.form.get('middle_name', user.middle_name if user and user.middle_name else '') }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Роль</label>
        <select name="role_id" class="form-select" {% if is_edit and current_user and current_user.role.name != 'Администратор' %}disabled{% endif %}>
            <option value="">Нет роли</option>
            {% for r in roles %}
            <option value="{{ r.id }}" {% if (user and user.role_id == r.id) or (request.form.get('role_id')|int == r.id) %}selected{% endif %}>{{ r.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{{ url_for('users') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endmacro %}
