{% extends 'base.html' %}
{% block content %}
<h2>Данные пользователя</h2>
<table class="table table-bordered w-50">
    <tr><th>ID</th><td>{{ user.id }}</td></tr>
    <tr><th>Логин</th><td>{{ user.login }}</td></tr>
    <tr><th>Фамилия</th><td>{{ user.last_name }}</td></tr>
    <tr><th>Имя</th><td>{{ user.first_name }}</td></tr>
    <tr><th>Отчество</th><td>{{ user.middle_name }}</td></tr>
    <tr><th>Роль</th><td>{{ user.role.name if user.role else 'Нет' }}</td></tr>
</table>
<a href="{{ url_for('users') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
